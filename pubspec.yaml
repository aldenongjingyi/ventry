name: ventry
description: "Ventry - Equipment tracking for field teams"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  supabase_flutter: ^2.8.0
  mobile_scanner: ^6.0.0
  flutter_dotenv: ^5.2.1
  intl: ^0.20.1
  shadcn_ui: ^0.50.2
  qr_flutter: ^4.1.0
  shimmer: ^3.0.0
  shared_preferences: ^2.3.3
  permission_handler: ^11.3.1
  google_sign_in: ^7.2.0
  app_links: ^6.3.3
  share_plus: ^10.1.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.3

flutter_native_splash:
  color: "#0A0A0A"
  android: true
  ios: true
  web: false

flutter:
  uses-material-design: true
  assets:
    - .env.dev
    - .env.prod
